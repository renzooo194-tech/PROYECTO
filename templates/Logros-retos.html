<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Logros y Retos</title>
    <link rel="stylesheet" href="logros.css">
</head>
<body>

<h1>🏆 Sistema de Logros</h1>

<div class="container">

    <div class="card">
        <h2>⭐ Puntos</h2>
        <p id="puntos">0</p>
    </div>

    <div class="card">
        <h2>📊 Nivel</h2>
        <p id="nivel">1</p>
    </div>

    <div class="card">
        <h2>🏅 Rango</h2>
        <p id="rango">Bronce</p>
    </div>

    <div class="card">
        <h2>🔥 Racha</h2>
        <p id="racha">0 días</p>
    </div>

    <div class="card">
        <h2>📈 Progreso</h2>
        <div class="barra">
            <div id="progreso"></div>
        </div>
    </div>

    <div class="card">
        <h2>🎯 Retos</h2>
        <ul id="retos"></ul>
    </div>

    <div class="card">
        <h2>🎖️ Insignias</h2>
        <div id="insignias"></div>
    </div>

</div>

<script>
let puntos = 0;
let nivel = 1;
let racha = 0;

// Retos por nivel
function generarRetos() {
    let lista = document.getElementById("retos");
    lista.innerHTML = "";

    let retos = [
        {texto: "Completar 1 ejercicio", pts: 10},
        {texto: "Estudiar 1 día", pts: 15},
        {texto: "Practicar 3 veces", pts: 20}
    ];

    if (nivel >= 3) {
        retos.push({texto: "Estudiar 5 días seguidos", pts: 40});
    }
    if (nivel >= 5) {
        retos.push({texto: "Completar 10 ejercicios", pts: 60});
    }
    if (nivel >= 8) {
        retos.push({texto: "Dominar un curso", pts: 100});
    }

    retos.forEach(r => {
        let li = document.createElement("li");
        li.innerHTML = `${r.texto} <button onclick="completar(${r.pts})">+${r.pts}</button>`;
        lista.appendChild(li);
    });
}

function completar(valor) {
    puntos += valor;
    racha += 1;

    // Subir nivel
    if (puntos >= nivel * 50) {
        nivel++;
    }

    document.getElementById("puntos").innerText = puntos;
    document.getElementById("nivel").innerText = nivel;
    document.getElementById("racha").innerText = racha + " días";

    // Progreso
    let progreso = (puntos % 50) * 2;
    document.getElementById("progreso").style.width = progreso + "%";

    actualizarRango();
    actualizarInsignias();
    generarRetos();
}

// Rangos
function actualizarRango() {
    let rango = "Bronce";

    if (nivel >= 3) rango = "Plata";
    if (nivel >= 5) rango = "Oro";
    if (nivel >= 8) rango = "Diamante";

    document.getElementById("rango").innerText = rango;
}

// Insignias
function actualizarInsignias() {
    let cont = document.getElementById("insignias");
    let insignias = "";

    if (puntos >= 20) insignias += "🥇 ";
    if (puntos >= 50) insignias += "🔥 ";
    if (puntos >= 100) insignias += "🚀 ";
    if (puntos >= 150) insignias += "👑 ";
    if (puntos >= 200) insignias += "💎 ";

    cont.innerHTML = insignias;
}

// iniciar
generarRetos();
</script>

</body>
</html>
