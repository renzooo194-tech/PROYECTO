<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Logros y Retos</title>
    <link rel="stylesheet" href="logros.css">
</head>
<body>

<h1>🏆 Sistema de Logros</h1>

<div class="container">

    <div class="card">
        <h2>⭐ Puntos</h2>
        <p id="puntos">0</p>
    </div>

    <div class="card">
        <h2>📊 Nivel</h2>
        <p id="nivel">1</p>
    </div>

    <div class="card">
        <h2>🏅 Rango</h2>
        <p id="rango">Bronce</p>
    </div>

    <div class="card">
        <h2>🔥 Racha</h2>
        <p id="racha">0 días</p>
    </div>

    <div class="card">
        <h2>📈 Progreso</h2>
        <div class="barra">
            <div id="progreso"></div>
        </div>
    </div>

    <div class="card">
        <h2>🎯 Retos</h2>
        <ul id="retos"></ul>
    </div>

    <div class="card">
        <h2>🎖️ Insignias</h2>
        <div id="insignias"></div>
    </div>

</div>

<script>
let puntos = 0;
let nivel = 1;
let racha = 0;

// Pool de retos
let poolRetos = [
    {texto: "Completar 1 ejercicio", pts: 10},
    {texto: "Estudiar 1 día", pts: 15},
    {texto: "Practicar 3 veces", pts: 20},
    {texto: "Leer un tema", pts: 25},
    {texto: "Resolver 5 preguntas", pts: 30},
    {texto: "Estudiar 2 horas", pts: 35},
    {texto: "Repasar tema difícil", pts: 40},
    {texto: "Practicar matemáticas", pts: 45},
    {texto: "Resolver examen corto", pts: 50}
];

// Retos activos (3 visibles)
let retosActivos = [];

// Iniciar retos
function iniciarRetos() {
    for (let i = 0; i < 3; i++) {
        agregarReto();
    }
    renderRetos();
}

// Agregar reto según nivel
function agregarReto() {
    let posibles = poolRetos.filter(r => r.pts <= nivel * 20);
    let random = posibles[Math.floor(Math.random() * posibles.length)];
    retosActivos.push(random);
}

// Mostrar retos
function renderRetos() {
    let lista = document.getElementById("retos");
    lista.innerHTML = "";

    retosActivos.forEach((r, index) => {
        let li = document.createElement("li");
        li.innerHTML = `${r.texto} 
        <button onclick="completar(${index})">+${r.pts}</button>`;
        lista.appendChild(li);
    });
}

// Completar reto
function completar(index) {
    let reto = retosActivos[index];

    puntos += reto.pts;
    racha += 1;

    // Subir nivel
    if (puntos >= nivel * 50) {
        nivel++;
    }

    // Eliminar reto completado
    retosActivos.splice(index, 1);

    // Agregar uno nuevo
    agregarReto();

    actualizarUI();
    renderRetos();
}

// Actualizar interfaz
function actualizarUI() {
    document.getElementById("puntos").innerText = puntos;
    document.getElementById("nivel").innerText = nivel;
    document.getElementById("racha").innerText = racha + " días";

    let progreso = (puntos % 50) * 2;
    document.getElementById("progreso").style.width = progreso + "%";

    actualizarRango();
    actualizarInsignias();
}

// Rangos
function actualizarRango() {
    let rango = "Bronce";
    if (nivel >= 3) rango = "Plata";
    if (nivel >= 5) rango = "Oro";
    if (nivel >= 8) rango = "Diamante";

    document.getElementById("rango").innerText = rango;
}

// Insignias
function actualizarInsignias() {
    let cont = document.getElementById("insignias");
    let ins = "";

    // 🥇 PRINCIPIANTE
    if (puntos >= 50) {
        ins += "🥇 ";
    }

    // 🔥 CONSTANTE
    if (racha >= 5) {
        ins += "🔥 ";
    }

    // 🚀 DEDICADO
    if (puntos >= 150 && nivel >= 3) {
        ins += "🚀 ";
    }

    // 🧠 EXPERTO
    if (puntos >= 300 && nivel >= 5) {
        ins += "🧠 ";
    }

    // 👑 MAESTRO
    if (puntos >= 500 && nivel >= 7 && racha >= 10) {
        ins += "👑 ";
    }

    // 💎 LEGENDARIO (difícil de verdad)
    if (puntos >= 800 && nivel >= 10 && racha >= 15) {
        ins += "💎 ";
    }

    // 🏆 IMPARABLE
    if (racha >= 20) {
        ins += "🏆 ";
    }

    // ⚡ VELOCISTA
    if (puntos >= 400 && racha >= 8) {
        ins += "⚡ ";
    }

    cont.innerHTML = ins || "Sin insignias aún 😢";
}

// Iniciar sistema
iniciarRetos();
</script>

</body>
</html>
